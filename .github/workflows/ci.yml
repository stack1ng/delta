name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - name: Build, typecheck, lint, test
        run: nix develop --command bash -c 'bun install --frozen-lockfile && bun run ci'
